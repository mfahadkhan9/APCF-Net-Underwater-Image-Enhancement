project:
  name: APCF-Net
  run_name: apcfnet_raw_uieb
  seed: 42

data:
  train_dir: data/raw/train
  val_dir: data/raw/val
  test_dir: data/raw/test
  image_size: 256
  num_workers: 2
  extensions: [".jpg", ".jpeg", ".png", ".bmp"]

model:
  base_channels: 32
  num_curve_segments: 8
  use_tca: true
  use_curve: true

training:
  epochs: 80
  batch_size: 4
  learning_rate: 0.0001
  weight_decay: 0.00001
  mixed_precision: false
  save_every: 10

loss:
  lambda_spatial: 1.0
  lambda_exposure: 10.0
  lambda_color: 5.0
  lambda_tv: 1.0
  lambda_curve: 0.1
  exposure_target: 0.60
  patch_size: 16

paths:
  output_root: results
  checkpoint_dir: saved_models/apcfnet
  log_dir: logs
  enhanced_dir: results/enhanced
  figure_dir: results/figures
  metrics_dir: results/metrics
